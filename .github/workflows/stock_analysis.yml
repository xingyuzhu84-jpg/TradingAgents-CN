name: 股票分析

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码'
        required: true
        default: '600938'
      stock_date:
        description: '分析日期'
        required: false
        default: '2026-03-06'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -e .
          
      - name: Run analysis
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MONGODB_ENABLED: 'false'
          REDIS_ENABLED: 'false'
        run: |
          python -m cli.main analyze ${{ github.event.inputs.stock_code }} --date ${{ github.event.inputs.stock_date }}
